        .bento-card::before {

            inset: 0;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.05), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;

        /* Hover dynamics handled by Tailwind group-hover classes inline for precision */
        .bento-card:hover {
            transform: translateZ(0) translateY(-4px) scale(1.01);
        }
        .bento-card:hover::before {
            opacity: 1;
        }

        /* Inner content layering fix */
        .bento-card > * {
            position: relative;
            z-index: 10;
        }

        /* Custom Cursor */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px; border-radius: 50%; background-color: #ff6b00;
            pointer-events: none; z-index: 9999; transform: translate(-50%, -50%);

        }
        .custom-cursor.hovering { width: 50px; height: 50px; background-color: rgba(255, 107, 0, 0.15); border: 1px solid #ff6b00; backdrop-filter: blur(2px); }

        .bg-grid-pattern-dark {

    <!-- Custom Notifications Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#111] border border-white/10 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 pointer-events-none translate-y-4 transition-all duration-300 z-[100] flex items-center gap-2">

    <script>
        // Set dynamic year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Optimized Custom Cursor Logic
        if (window.matchMedia("(pointer: fine)").matches) {
            const cursor = document.getElementById('cursor');
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let cursorX = window.innerWidth / 2;
            let cursorY = window.innerHeight / 2;

            const lerp = (start, end, factor) => start + (end - start) * factor;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function renderCursor() {
                cursorX = lerp(cursorX, mouseX, 0.3);
                cursorY = lerp(cursorY, mouseY, 0.3);
                cursor.style.transform = `translate3d(calc(${cursorX}px - 50%), calc(${cursorY}px - 50%), 0)`;
                requestAnimationFrame(renderCursor);
            }
            requestAnimationFrame(renderCursor);

            document.body.addEventListener('mouseover', (e) => {
                if(e.target && (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a') || e.target.closest('button') || e.target.classList?.contains('interactive-element') || e.target.closest('.interactive-element'))) {
                    cursor.classList.add('hovering');
                }
            }, true);
            
            document.body.addEventListener('mouseout', (e) => {
                if(e.target && (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('a') || e.target.closest('button') || e.target.classList?.contains('interactive-element') || e.target.closest('.interactive-element'))) {
                    cursor.classList.remove('hovering');
                }
            }, true);
        }

        // Toast Notification System
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.textContent = message;
            
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 16px)';
            }, 3000);
        }

        // Share Button Logic
        const shareBtn = document.getElementById('share-btn');
        if (shareBtn) {
            shareBtn.addEventListener('click', async () => {
                const shareData = {
                    title: 'Himangshu Paul | Links',
                    text: 'Connect with Himangshu Paul or view his portfolio.',
                    url: window.location.href
                };

                if (navigator.share) {
                    try {
                        await navigator.share(shareData);
                    } catch (err) {
                        console.log('Share canceled or failed', err);
                    }
                } else {
                    try {
                        await navigator.clipboard.writeText(window.location.href);
                        showToast('Link copied to clipboard!');
                    } catch (err) {
                        const textArea = document.createElement("textarea");
                        textArea.value = window.location.href;
                        document.body.appendChild(textArea);
                        textArea.select();
                        try {
                            document.execCommand('copy');
                            showToast('Link copied to clipboard!');
                        } catch (err) {
                            showToast('Failed to copy link.');
                        }
                        document.body.removeChild(textArea);
                    }
                }
            });
        }

        // Initialize GSAP Entrance Animations (Smooth staggering)
        document.addEventListener('DOMContentLoaded', () => {
            gsap.from('.gs-header', {
                y: 20, 
                opacity: 0, 
                duration: 1, 
                ease: "power3.out",
                stagger: 0.1
            });

            gsap.from('.gs-link', {
                y: 30, 
                autoAlpha: 0, 
                duration: 0.8, 
                ease: "power3.out",
                stagger: 0.1,
                delay: 0.2
            });
        });
    </script>
